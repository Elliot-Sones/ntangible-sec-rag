<!-- NTangible Chat Widget -->
<style>
#ntangible-chat-bubble{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#000;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:10000;transition:transform .2s}
#ntangible-chat-bubble:hover{transform:scale(1.1)}
#ntangible-chat-bubble svg{width:24px;height:24px}
#ntangible-chat-panel{position:fixed;bottom:90px;right:24px;width:460px;min-width:460px;min-height:500px;max-height:700px;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08);display:flex;flex-direction:column;z-index:10000;overflow:hidden;font-family:'Inter',sans-serif;opacity:0;visibility:hidden;transform:translateY(12px) scale(0.98);transform-origin:bottom right;transition:opacity .2s ease,transform .22s cubic-bezier(.16,1,.3,1),visibility 0s linear .2s}
#ntangible-chat-panel.open{opacity:1;visibility:visible;transform:translateY(0) scale(1);transition:opacity .2s ease,transform .22s cubic-bezier(.16,1,.3,1),visibility 0s linear 0s}
#ntangible-chat-panel.nc-full{inset:0;width:100%;height:100%;max-height:none;border-radius:0}
#ntangible-chat-panel.nc-full .nc-messages{max-height:none}
#ntangible-chat-panel.nc-full .nc-video{max-width:480px}
#ntangible-chat-panel.nc-full .nc-video iframe{height:270px}
#ntangible-chat-panel.nc-full .nc-resize{display:none}
.nc-resize{position:absolute;z-index:10}
.nc-resize-corner{top:0;left:0;width:12px;height:12px;cursor:nw-resize}
.nc-resize-left{top:12px;left:0;width:5px;height:calc(100% - 12px);cursor:ew-resize}
.nc-resize-top{top:0;left:12px;width:calc(100% - 12px);height:5px;cursor:ns-resize}
.nc-mode-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;transition:background .2s;display:flex;align-items:center}
.nc-mode-btn:hover{background:rgba(255,255,255,.25)}
.nc-mode-btn.active{background:rgba(255,255,255,.3)}
.nc-options{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-self:flex-start}
.nc-option-btn{background:#fff;border:1.5px solid #2563eb;color:#2563eb;border-radius:20px;padding:5px 13px;font-size:.78rem;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s ease,color .15s ease,border-color .15s ease;white-space:nowrap;line-height:1.4}
.nc-option-btn:hover{background:#2563eb;color:#fff}
.nc-option-btn:active{transform:scale(0.97)}
.nc-context-bar{background:#f0fdf4;border-bottom:1px solid #dcfce7;padding:10px 16px;font-size:.75rem;color:#166534;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:0}
.nc-context-bar svg{width:13px;height:13px;opacity:.55;flex-shrink:0}
.nc-context-bar .nc-ctx-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.nc-context-bar .nc-ctx-label{font-weight:600;margin-right:2px}
.nc-history-list{flex:1;overflow-y:auto;display:none;flex-direction:column}
.nc-history-list.active{display:flex}
.nc-history-list.active ~ .nc-messages,
.nc-history-list.active ~ .nc-input-area{display:none}
.nc-history-item{padding:12px 20px;border-bottom:1px solid #e5e7eb;cursor:pointer;transition:background .15s}
.nc-history-item:hover{background:#f1f5f9}
.nc-history-item.current{background:#eff6ff;border-left:3px solid #2563eb}
.nc-history-preview{font-size:.82rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.nc-history-meta{font-size:.7rem;color:#94a3b8;margin-top:3px;display:flex;gap:8px}
.nc-history-empty{padding:32px 20px;text-align:center;color:#94a3b8;font-size:.85rem}
.nc-header{background:#000;color:#fff;padding:14px 16px 14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.nc-header h3{margin:0;font-size:.9rem;font-weight:600}
.nc-close{background:none;border:none;color:#fff;cursor:pointer;font-size:1.2rem;padding:0;line-height:1}
.nc-new-chat{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:6px;line-height:1;transition:background .2s}
.nc-new-chat:hover{background:rgba(255,255,255,.25)}
.nc-player-ctx{display:none!important}
.nc-messages{flex:1;overflow-y:auto;padding:16px 16px 12px;display:flex;flex-direction:column;gap:4px;min-height:240px;max-height:480px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:#cbd5e1 transparent}
.nc-messages::-webkit-scrollbar{width:4px}
.nc-messages::-webkit-scrollbar-track{background:transparent}
.nc-messages::-webkit-scrollbar-thumb{background-color:#cbd5e1;border-radius:10px}
.nc-messages::-webkit-scrollbar-thumb:hover{background-color:#94a3b8}
.nc-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.85rem;line-height:1.5;word-wrap:break-word;overflow-wrap:break-word;animation:ncMsgIn .22s cubic-bezier(.16,1,.3,1) both}
.nc-msg.nc-turn-start{margin-top:10px}
.nc-msg.user{background:#2563eb;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;box-shadow:0 1px 2px rgba(37,99,235,.25)}
.nc-msg.assistant{background:#f1f5f9;color:#1e293b;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
@keyframes ncMsgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nc-msg p{margin:0 0 8px}
.nc-msg p:last-child{margin:0}
.nc-msg ul,.nc-msg ol{margin:4px 0;padding-left:20px}
.nc-msg strong{font-weight:600}
.nc-video{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;margin-top:8px}
.nc-video-title{font-size:.75rem;font-weight:600;margin-bottom:6px;color:#374151}
.nc-video iframe{width:100%;height:180px;border:none;border-radius:6px}
.nc-input-area{border-top:1px solid #e5e7eb;padding:10px 14px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:#fff}
.nc-input-area textarea{flex:1;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:.85rem;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s ease,box-shadow .15s ease;color:#1e293b;background:#fafafa;resize:none;min-height:40px;max-height:120px;line-height:1.45;overflow-y:auto}
.nc-input-area textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
.nc-input-area textarea::placeholder{color:#9ca3af;font-size:.8rem}
.nc-input-area button{background:#000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s ease,transform .1s ease;margin-bottom:1px}
.nc-input-area button:hover:not(:disabled){background:#1a1a1a}
.nc-input-area button:active:not(:disabled){transform:scale(0.97)}
.nc-input-area button:disabled{opacity:.45;cursor:not-allowed}
.nc-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.nc-typing span{width:6px;height:6px;background:#94a3b8;border-radius:50%;animation:ncBounce .6s infinite alternate}
.nc-typing span:nth-child(2){animation-delay:.2s}
.nc-typing span:nth-child(3){animation-delay:.4s}
@keyframes ncBounce{to{transform:translateY(-6px);opacity:.3}}
.nc-citations{margin-top:8px;padding:8px 12px;background:#fefce8;border:1px solid #fef08a;border-radius:8px;font-size:.72rem;color:#854d0e}
.nc-citations strong{font-weight:600;display:block;margin-bottom:3px}
@media(max-width:520px){#ntangible-chat-panel{width:calc(100vw - 24px);right:12px;bottom:80px;max-height:70vh}}
</style>

<div id="ntangible-chat-panel">
  <div class="nc-resize nc-resize-corner"></div>
  <div class="nc-resize nc-resize-left"></div>
  <div class="nc-resize nc-resize-top"></div>
  <div class="nc-header">
    <h3>NTangible Assistant</h3>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="nc-new-chat" onclick="window.ntangibleChat.toggleHistory()" title="History" id="nc-history-btn">History</button>
      <button class="nc-new-chat" onclick="window.ntangibleChat.newChat()" title="New Chat">New Chat</button>
      <button class="nc-mode-btn" onclick="window.ntangibleChat.toggleFull()" title="Full Screen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>

<script>
(function() {
  const chat = {
    isOpen: false,
    sessionId: null,
    sending: false,
    isFullScreen: false,
    selectedSport: null,

    init() {
      this.sessionId = null;
      this.initResize();
      this.observeSportSelection();
    },

    observeSportSelection() {
      // Watch for clicks on team cards in the SEC demo to detect selected sport
      const observer = new MutationObserver(() => {
        // Try to read the current sport from the page heading
        const heading = document.querySelector('main h1');
        if (heading) {
          const text = heading.textContent.trim().toLowerCase();
          const sportMap = {
            'football': 'football', 'baseball': 'baseball', 'softball': 'softball',
            "women's basketball": 'wbball', "men's basketball": 'mbball',
            "women's soccer": 'wsoccer', "men's soccer": 'msoccer',
            "women's volleyball": 'wvolleyball', "men's volleyball": 'mvolleyball',
            'hockey': 'hockey'
          };
          let bestMatch = null;
          let bestLen = 0;
          for (const [label, id] of Object.entries(sportMap)) {
            if (text.includes(label) && label.length > bestLen) {
              bestMatch = id;
              bestLen = label.length;
            }
          }
          if (bestMatch) {
            this.selectedSport = bestMatch;
            this.updateContextBar();
            return;
          }
        }
        // On master dashboard, no sport selected
        this.selectedSport = null;
        this.updateContextBar();
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    },

    updateContextBar() {
      const el = document.getElementById('nc-ctx-text');
      if (!el) return;
      if (this.selectedSport) {
        const labels = {
          football: 'Football', baseball: 'Baseball', softball: 'Softball',
          mbball: "Men's Basketball", wbball: "Women's Basketball",
          msoccer: "Men's Soccer", wsoccer: "Women's Soccer",
          mvolleyball: "Men's Volleyball", wvolleyball: "Women's Volleyball",
          hockey: 'Hockey'
        };
        el.textContent = 'SEC ' + (labels[this.selectedSport] || this.selectedSport) + ' Officials';
      } else {
        el.textContent = 'SEC Officials Intelligence \u00b7 All Sports';
      }
    },

    async createSession() {
      try {
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ selectedSport: this.selectedSport })
        });
        const data = await res.json();
        this.sessionId = data.sessionId;
      } catch (err) {
        this.sessionId = 'local-' + Date.now();
      }
    },

    async newChat() {
      await this.createSession();
      document.getElementById('nc-messages').innerHTML = '';
      document.getElementById('nc-history-list').classList.remove('active');
      const input = document.getElementById('nc-input');
      input.value = '';
      input.style.height = 'auto';
      input.focus();
    },

    async toggleHistory() {
      const list = document.getElementById('nc-history-list');
      if (list.classList.contains('active')) {
        list.classList.remove('active');
        return;
      }
      list.innerHTML = '<div class="nc-history-empty">History is per-session. Use New Chat to start fresh.</div>';
      list.classList.add('active');
    },

    timeAgo(dateStr) {
      const now = Date.now();
      const then = new Date(dateStr).getTime();
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return new Date(dateStr).toLocaleDateString();
    },

    toggle() {
      this.isOpen = !this.isOpen;
      const panel = document.getElementById('ntangible-chat-panel');
      panel.classList.toggle('open', this.isOpen);
      if (!this.isOpen) {
        panel.classList.remove('nc-full');
        panel.style.width = '';
        panel.style.height = '';
        panel.style.maxHeight = '';
        const msgArea = panel.querySelector('.nc-messages');
        if (msgArea) msgArea.style.maxHeight = '';
        this.isFullScreen = false;
        document.getElementById('ntangible-chat-bubble').style.display = '';
        document.querySelector('.nc-mode-btn').classList.remove('active');
        document.getElementById('nc-history-list').classList.remove('active');
      }
      if (this.isOpen) {
        if (!this.sessionId) {
          this.newChat();
        }
        document.getElementById('nc-input').focus();
        this.scrollToBottom();
      }
    },

    toggleFull() {
      const panel = document.getElementById('ntangible-chat-panel');
      const bubble = document.getElementById('ntangible-chat-bubble');
      const btn = document.querySelector('.nc-mode-btn');
      this.isFullScreen = !this.isFullScreen;
      if (this.isFullScreen) {
        panel.style.width = '';
        panel.style.height = '';
        panel.style.maxHeight = '';
        panel.classList.add('nc-full');
        bubble.style.display = 'none';
        if (btn) btn.classList.add('active');
      } else {
        panel.classList.remove('nc-full');
        bubble.style.display = '';
        if (btn) btn.classList.remove('active');
      }
      this.scrollToBottom();
    },

    initResize() {
      const panel = document.getElementById('ntangible-chat-panel');
      panel.querySelectorAll('.nc-resize').forEach(zone => {
        zone.addEventListener('mousedown', (e) => {
          e.preventDefault();
          if (panel.classList.contains('nc-full')) return;
          const isCorner = zone.classList.contains('nc-resize-corner');
          const isLeft = zone.classList.contains('nc-resize-left');
          const isTop = zone.classList.contains('nc-resize-top');
          const startX = e.clientX;
          const startY = e.clientY;
          const startW = panel.offsetWidth;
          const startH = panel.offsetHeight;
          const msgArea = panel.querySelector('.nc-messages');
          const onMove = (ev) => {
            if (isCorner || isLeft) {
              panel.style.width = Math.max(460, startW - (ev.clientX - startX)) + 'px';
            }
            if (isCorner || isTop) {
              panel.style.height = Math.max(500, startH - (ev.clientY - startY)) + 'px';
              panel.style.maxHeight = 'none';
              if (msgArea) msgArea.style.maxHeight = 'none';
            }
          };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            document.body.style.userSelect = '';
          };
          document.body.style.userSelect = 'none';
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      });
    },

    sendOption(text) {
      document.querySelectorAll('.nc-options').forEach(el => el.remove());
      document.getElementById('nc-input').value = text;
      this.send();
    },

    addMessage(role, content, videos, options) {
      const container = document.getElementById('nc-messages');
      const div = document.createElement('div');
      div.className = 'nc-msg ' + role;
      const prev = container.querySelector('.nc-msg:last-of-type');
      if (!prev || !prev.classList.contains(role)) div.classList.add('nc-turn-start');

      if (role === 'assistant') {
        div.innerHTML = this.renderMarkdown(content);
      } else {
        div.textContent = content;
      }

      container.appendChild(div);

      if (videos && videos.length > 0) {
        videos.forEach(v => {
          const videoDiv = document.createElement('div');
          videoDiv.className = 'nc-video';
          const embedUrl = this.getEmbedUrl(v.url);
          videoDiv.innerHTML = '<div class="nc-video-title">' + this.escapeHtml(v.title) + '</div>' +
            (embedUrl ? '<iframe src="' + embedUrl + '" allowfullscreen loading="lazy"></iframe>' : '<a href="' + this.escapeHtml(v.url) + '" target="_blank" rel="noopener">Watch Video</a>');
          container.appendChild(videoDiv);
        });
      }

      if (options && options.length > 0) {
        const optDiv = document.createElement('div');
        optDiv.className = 'nc-options';
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'nc-option-btn';
          btn.textContent = opt;
          btn.onclick = () => window.ntangibleChat.sendOption(opt);
          optDiv.appendChild(btn);
        });
        container.appendChild(optDiv);
      }

      this.scrollToBottom();
    },

    addCitations(citations) {
      if (!citations || citations.length === 0) return;
      const container = document.getElementById('nc-messages');
      const div = document.createElement('div');
      div.className = 'nc-citations';
      div.innerHTML = '<strong>Sources</strong>' + citations.map(c =>
        this.escapeHtml(c.title) + ' (' + this.escapeHtml(c.docType) + ')'
      ).join(' \u00b7 ');
      container.appendChild(div);
      this.scrollToBottom();
    },

    showTyping() {
      const container = document.getElementById('nc-messages');
      const div = document.createElement('div');
      div.className = 'nc-typing';
      div.id = 'nc-typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      container.appendChild(div);
      this.scrollToBottom();
    },

    hideTyping() {
      const el = document.getElementById('nc-typing-indicator');
      if (el) el.remove();
    },

    async send() {
      if (this.sending) return;
      const input = document.getElementById('nc-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      input.style.height = 'auto';
      this.sending = true;
      document.getElementById('nc-send-btn').disabled = true;

      this.addMessage('user', message);
      this.showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            sessionId: this.sessionId,
            selectedSport: this.selectedSport
          }),
        });

        const data = await res.json();
        this.hideTyping();

        if (data.error) {
          this.addMessage('assistant', 'Sorry, something went wrong. Please try again.');
        } else {
          // Update session ID from server response
          if (data.session && data.session.sessionId) {
            this.sessionId = data.session.sessionId;
          }

          this.addMessage('assistant', data.answer, data.videos, data.followUps);

          // Show citations if present
          if (data.citations && data.citations.length > 0) {
            this.addCitations(data.citations);
          }
        }
      } catch (err) {
        this.hideTyping();
        this.addMessage('assistant', 'Connection error. Please check your network and try again.');
      }

      this.sending = false;
      document.getElementById('nc-send-btn').disabled = false;
    },

    renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>')
        .replace(/<p><\/p>/g, '')
        .replace(/<p>(<ul>)/g, '$1')
        .replace(/(<\/ul>)<\/p>/g, '$1');
    },

    getEmbedUrl(url) {
      if (!url) return null;
      const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
      return match ? 'https://www.youtube.com/embed/' + match[1] : null;
    },

    escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    },

    scrollToBottom() {
      const el = document.getElementById('nc-messages');
      setTimeout(() => { el.scrollTop = el.scrollHeight; }, 50);
    },
  };

  window.ntangibleChat = chat;
  document.addEventListener('DOMContentLoaded', () => chat.init());
})();
</script>

</body>
</html>
